<div class="auth-bg d-flex align-items-center justify-content-center">
    <div class="glass-card p-5" style="width: 100%; max-width: 500px;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary mb-1">Create Account</h2>
            <p class="text-muted">Join us today! Let's get started.</p>
        </div>

        <!-- Syncfusion EJ2 Toast Notification -->
        <ejs-toast #toastObj [position]="position"></ejs-toast>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <ejs-textbox formControlName="firstName" placeholder="First Name" floatLabelType="Auto"
                        cssClass="e-outline">
                    </ejs-textbox>
                </div>
                <div class="col-md-6">
                    <ejs-textbox formControlName="lastName" placeholder="Last Name" floatLabelType="Auto"
                        cssClass="e-outline">
                    </ejs-textbox>
                </div>
            </div>

            <div class="mb-4">
                <ejs-textbox formControlName="email" placeholder="Email address" floatLabelType="Auto"
                    cssClass="e-outline">
                </ejs-textbox>
            </div>

            <div class="mb-4">
                <ejs-textbox formControlName="password" type="password" placeholder="Create a Password"
                    floatLabelType="Auto" cssClass="e-outline">
                </ejs-textbox>
            </div>

            <!-- Syncfusion Button -->
            <div class="d-grid mb-3">
                <button ejs-button [isPrimary]="true" cssClass="e-success e-lg" [disabled]="registerForm.invalid"
                    style="border-radius: 8px;">
                    Create Account
                </button>
            </div>

        </form>

        <div class="text-center mt-4">
            <span class="text-muted">Already have an account? </span>
            <a routerLink="/auth/login" class="text-primary fw-semibold text-decoration-none">Login</a>
        </div>

    </div>
</div>
