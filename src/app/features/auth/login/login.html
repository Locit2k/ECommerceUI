<div class="auth-bg d-flex align-items-center justify-content-center">
    <div class="glass-card p-5" style="width: 100%; max-width: 450px;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary mb-1">ECommerce UI</h2>
            <p class="text-muted">Welcome back! Please login to your account.</p>
        </div>

        <!-- Syncfusion EJ2 Toast Notification -->
        <ejs-toast #toastObj [position]="position"></ejs-toast>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="mb-4">
                <!-- Syncfusion TextBox -->
                <ejs-textbox formControlName="username" placeholder="Username" floatLabelType="Auto"
                    cssClass="e-outline">
                </ejs-textbox>
            </div>

            <div class="mb-4">
                <!-- Syncfusion TextBox for Password -->
                <ejs-textbox formControlName="password" type="password" placeholder="Password" floatLabelType="Auto"
                    cssClass="e-outline">
                </ejs-textbox>
                <div class="text-end mt-2">
                    <a href="#" class="text-decoration-none text-sm small">Forgot Password?</a>
                </div>
            </div>

            <!-- Syncfusion Button -->
            <div class="d-grid mb-3">
                <button ejs-button [isPrimary]="true" cssClass="e-lg" [disabled]="loginForm.invalid"
                    style="border-radius: 8px;">
                    Login
                </button>
            </div>

        </form>

        <div class="text-center mt-4">
            <span class="text-muted">Don't have an account? </span>
            <a routerLink="/auth/register" class="text-primary fw-semibold text-decoration-none">Sign Up</a>
        </div>

    </div>
</div>
